<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Product preview card</title>
</head>

<body>

  <main class="conteiner-glowny">

   
    <div class="prawa-strona">
      <picture>
        <source media="(max-width: 600px)" srcset="images/image-product-mobile.jpg">
        <img src="images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum">
      </picture>
    </div>


    <section class="lewa-strona">

      <p class="typ-towaru">Perfume</p>

      <h1 class="naglowek">Gabrielle Essence Eau De Parfum</h1>

      <p class="opis">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="conteiner-cena">
        <span class="cena">$149.99</span>
        <span class="przecena">$169.99</span>
      </div>

      <button class="btn">
        <img src="images/icon-cart.svg" alt="">
        Add to Cart
      </button>

    </section>

  </main>

</body>
</html>
